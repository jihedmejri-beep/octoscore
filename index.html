<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- Primary SEO -->
    <meta name="google-site-verification" content="4jnVGaNGtXvKPr9CgW45S24RJhNk0Te7CXi1V0Bb_KE" />
    <meta
      name="description"
      content="OctoScore is the official live hub of the Octopus Tournament — real-time scores, group standings, fixtures, top scorers, team squads and a football quiz. Follow every match live."
    />
    <meta
      name="keywords"
      content="OctoScore, Octopus Tournament, live football scores, tournament standings, top scorers, fixtures, Sousse, Teboulba, football quiz"
    />
    <meta name="author" content="OctoScore" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://octoscore.vercel.app/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OctoScore" />
    <meta property="og:title" content="OctoScore — Live Octopus Tournament Hub" />
    <meta
      property="og:description"
      content="Real-time scores, standings, top scorers and fixtures for the Octopus Tournament. Follow every match live on OctoScore."
    />
    <meta property="og:url" content="https://octoscore.vercel.app/" />
    <meta property="og:image" content="https://octoscore.vercel.app/pwa-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="fr_FR" />
    <meta property="og:locale:alternate" content="ar_AR" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="OctoScore — Live Octopus Tournament Hub" />
    <meta
      name="twitter:description"
      content="Real-time scores, standings, top scorers and fixtures for the Octopus Tournament. Follow every match live."
    />
    <meta name="twitter:image" content="https://octoscore.vercel.app/pwa-512x512.png" />

    <!-- Structured data: helps Google show OctoScore as a recognised brand/site -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "OctoScore",
        "alternateName": "Octopus Tournament",
        "url": "https://octoscore.vercel.app/",
        "description": "Live hub of the Octopus Tournament — real-time scores, standings, top scorers and fixtures.",
        "inLanguage": ["en", "fr", "ar"],
        "publisher": {
          "@type": "Organization",
          "name": "OctoScore",
          "logo": {
            "@type": "ImageObject",
            "url": "https://octoscore.vercel.app/pwa-512x512.png"
          }
        }
      }
    </script>
    <!-- iOS "Add to Home Screen" support: fullscreen app, dark status bar, app icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OctoScore" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>OctoScore — Live Octopus Tournament Scores, Standings & Top Scorers</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
